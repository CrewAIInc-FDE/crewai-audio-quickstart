<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Assistant</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230e6ea8'/%3E%3Cstop offset='1' stop-color='%2327aae1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Crect x='14' y='26' width='7' height='20' rx='3.5' fill='%23eaf7fd'/%3E%3Crect x='28.5' y='16' width='7' height='40' rx='3.5' fill='%23eaf7fd'/%3E%3Crect x='43' y='23' width='7' height='26' rx='3.5' fill='%23eaf7fd'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --bg0: #050d17;
      --bg1: #0a1a2b;
      --card: #0d1f33;
      --card-edge: #1b3350;
      --ink: #e8f1f8;
      --ink-dim: #8fa6ba;
      --ink-faint: #5f7793;
      --accent: #27aae1;
      --accent-deep: #0e6ea8;
      --user-a: #0e6ea8;
      --user-b: #1c93cf;
      --assistant: #14273d;
      --danger: #d64545;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--ink);
      font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #103154 0%, transparent 60%),
                  linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    ::selection { background: rgba(39, 170, 225, .35); }
    main { max-width: 780px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }

    h1 {
      display: flex; align-items: center; gap: .65rem;
      font-size: 1.25rem; font-weight: 650; letter-spacing: .01em; margin: .5rem 0 1.1rem;
    }
    h1::before {
      content: ""; width: 26px; height: 26px; border-radius: 7px; flex: none;
      background:
        linear-gradient(#eaf7fd, #eaf7fd) 5px 55% / 3px 34% no-repeat,
        linear-gradient(#eaf7fd, #eaf7fd) 11.5px 50% / 3px 62% no-repeat,
        linear-gradient(#eaf7fd, #eaf7fd) 18px 55% / 3px 44% no-repeat,
        linear-gradient(135deg, var(--accent-deep), var(--accent));
      box-shadow: 0 2px 10px rgba(39, 170, 225, .35);
    }
    h1 .tag {
      font-size: .72rem; font-weight: 500; color: var(--ink-faint);
      letter-spacing: .14em; text-transform: uppercase; margin-left: .25rem;
      align-self: center; padding-top: .2em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-edge);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 28px rgba(2, 8, 16, .45);
    }

    label { display: block; font-size: .74rem; color: var(--ink-dim);
            margin: .65rem 0 .2rem; letter-spacing: .02em; }
    input[type=text], input[type=password] {
      width: 100%; padding: .55rem .65rem;
      background: #081525; color: var(--ink);
      border: 1px solid #21395a; border-radius: 8px;
      font-size: .92rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus, input[type=password]:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(39, 170, 225, .18);
    }
    input[type=checkbox] { accent-color: var(--accent); }

    button {
      background: linear-gradient(135deg, var(--accent-deep), var(--accent));
      color: #fff; border: 0; border-radius: 8px;
      padding: .55rem 1.05rem; margin: .3rem .35rem 0 0;
      font-size: .92rem; font-weight: 600; cursor: pointer;
      transition: filter .12s, transform .05s;
    }
    button:hover { filter: brightness(1.12); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .4; cursor: default; filter: none; }
    button.ghost {
      background: transparent; border: 1px solid #24405f; color: var(--ink-dim);
      font-weight: 500;
    }
    button.ghost:hover { color: var(--ink); border-color: var(--accent-deep); }
    button.rec { background: var(--danger); animation: rec-pulse 1.6s ease-out infinite; }
    @keyframes rec-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(214, 69, 69, .55); }
      70%  { box-shadow: 0 0 0 12px rgba(214, 69, 69, 0); }
      100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0); }
    }

    .row { display: flex; gap: .5rem; align-items: center; }
    .row input { flex: 1; }
    .row button { margin-top: 0; white-space: nowrap; }

    .msgs { display: flex; flex-direction: column; gap: .55rem; }
    .msg {
      padding: .62rem .85rem; border-radius: 12px; white-space: pre-wrap;
      max-width: 88%; line-height: 1.42; font-size: .95rem;
      animation: msg-in .18s ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }
    .user {
      background: linear-gradient(135deg, var(--user-a), var(--user-b));
      align-self: flex-end; border-bottom-right-radius: 4px;
      box-shadow: 0 3px 12px rgba(14, 110, 168, .3);
    }
    .assistant {
      background: var(--assistant); border: 1px solid #1d3652;
      align-self: flex-start; border-bottom-left-radius: 4px;
    }

    .status { font-size: .78rem; color: var(--accent); min-height: 1.15em;
              margin: .55rem 0 .45rem; }
    .sess {
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
      font-size: .7rem; color: var(--ink-faint); word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin: .8rem 0 0;
    }
    .sess button { font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
                   font-size: .72rem; padding: .3rem .7rem; margin: 0; }

    details summary {
      cursor: pointer; color: var(--ink-dim); font-size: .85rem;
      letter-spacing: .01em;
    }
    details summary:hover { color: var(--ink); }
  </style>
