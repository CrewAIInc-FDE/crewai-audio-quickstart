<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Assistant — CrewAI audio quickstart</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
           background: #101418; color: #e6e9ec; }
    main { max-width: 780px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 1.15rem; letter-spacing: .02em; }
    .card { background: #171c22; border: 1px solid #232a33; border-radius: 10px;
            padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: .75rem; color: #9aa4ae; margin: .5rem 0 .15rem; }
    input[type=text], input[type=password] { width: 100%; padding: .5rem .6rem;
      background: #0d1116; color: #e6e9ec; border: 1px solid #2a323d; border-radius: 6px; }
    button { background: #2f6feb; color: white; border: 0; border-radius: 6px;
             padding: .55rem 1rem; margin: .25rem .35rem 0 0; cursor: pointer; }
    button:disabled { opacity: .45; cursor: default; }
    button.rec { background: #c93c3c; }
    button.ghost { background: #232a33; }
    .row { display: flex; gap: .5rem; }
    .row input { flex: 1; }
    .msgs { display: flex; flex-direction: column; gap: .5rem; }
    .msg { padding: .6rem .8rem; border-radius: 8px; white-space: pre-wrap;
           max-width: 92%; line-height: 1.35; }
    .user { background: #24406e; align-self: flex-end; }
    .assistant { background: #1d242c; align-self: flex-start; }
    .status { font-size: .78rem; color: #8b98a5; min-height: 1.1em; margin: .4rem 0; }
    .sess { font-size: .7rem; color: #6b7684; word-break: break-all; }
    details summary { cursor: pointer; color: #9aa4ae; font-size: .85rem; }
  </style>
</head>
<body></body>
</html>
